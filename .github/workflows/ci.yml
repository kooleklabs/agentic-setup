name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # package-lock.json is intentionally gitignored in this project, so
      # we use `npm install` (not `npm ci`) and skip the setup-node cache.
      - run: npm install --no-audit --no-fund
      - run: npm run lint

  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install --no-audit --no-fund
      - run: npm run test:coverage
      - name: Upload coverage summary
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/lcov-report/
          retention-days: 7

  verify:
    name: verify (node ${{ matrix.node }})
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: CLI syntax check
        run: node --check bin/cli.js

      - name: CLI --version matches package.json
        run: |
          CLI_VERSION=$(node bin/cli.js --version)
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$CLI_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::CLI version ($CLI_VERSION) doesn't match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: CLI --help works
        run: node bin/cli.js --help > /dev/null

      - name: Unknown command exits non-zero
        run: |
          if node bin/cli.js this-is-not-a-real-command 2>/dev/null; then
            echo "::error::CLI should exit non-zero on unknown commands"
            exit 1
          fi

      - name: npm pack dry-run
        run: npm pack --dry-run

      - name: Smoke test — init scaffolds a full framework
        run: |
          TMP=$(mktemp -d)
          cd "$TMP"
          node "$GITHUB_WORKSPACE/bin/cli.js" init
          for f in CLAUDE.md .claudeignore .mcp.json .claude/settings.json; do
            if [ ! -e "$f" ]; then
              echo "::error::Expected $f was not created"
              exit 1
            fi
          done
          for d in .claude/agents .claude/skills .claude/commands .claude/hooks contracts; do
            if [ ! -d "$d" ]; then
              echo "::error::Expected directory $d was not created"
              exit 1
            fi
          done
          # Verify hooks are executable (Task 10/11 guarantee)
          for hook in .claude/hooks/pre-commit.sh .claude/hooks/post-edit.sh; do
            if [ ! -x "$hook" ]; then
              echo "::error::Hook $hook is not executable after init"
              exit 1
            fi
          done
          # Verify docs/decisions scaffold (Task 12)
          for f in docs/decisions/README.md docs/decisions/000-template.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Expected $f was not created"
              exit 1
            fi
          done
          echo "init smoke test passed"

      - name: Smoke test — generate --help documents --skip-architecture
        run: |
          node "$GITHUB_WORKSPACE/bin/cli.js" generate --help | grep -q -- "--skip-architecture" \
            || { echo "::error::--skip-architecture flag not documented in generate --help"; exit 1; }
          node "$GITHUB_WORKSPACE/bin/cli.js" generate --help | grep -q -- "--from-analysis" \
            || { echo "::error::--from-analysis flag not documented in generate --help"; exit 1; }
          echo "architecture-gate flag smoke passed"

      - name: Smoke test — push-architecture --help documents all flags
        run: |
          HELP=$(node "$GITHUB_WORKSPACE/bin/cli.js" push-architecture --help)
          for flag in "--dry-run" "--force" "--no-umbrella" "--milestone"; do
            echo "$HELP" | grep -q -- "$flag" \
              || { echo "::error::$flag not documented in push-architecture --help"; exit 1; }
          done
          echo "push-architecture --help smoke passed"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          ignore_paths: |
            .claude
            .worktrees
            node_modules
          severity: warning
